<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Base gradient -->
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#cccccc" />
    </linearGradient>
    <!-- Shadow gradient for 3D depth -->
    <linearGradient id="cloudShadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#dddddd" />
      <stop offset="100%" stop-color="#999999" />
    </linearGradient>
  </defs>
  
  <!-- Back/bottom layer (shadow/thickness) -->
  <path d="M 25 65 A 15 15 0 0 1 25 35 A 20 20 0 0 1 65 30 A 18 18 0 0 1 85 45 A 15 15 0 0 1 75 70 Z" fill="url(#cloudShadow)" stroke="#164666" stroke-width="2"/>
  
  <!-- Front layer -->
  <path d="M 25 60 A 15 15 0 0 1 25 30 A 20 20 0 0 1 65 25 A 18 18 0 0 1 85 40 A 15 15 0 0 1 75 65 Z" fill="url(#cloudGrad)" stroke="#256c9a" stroke-width="2"/>
