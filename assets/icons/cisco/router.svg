<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Cylinder base (Router shape) -->
  <path d="M 20 50 L 20 70 A 30 15 0 0 0 80 70 L 80 50 Z" fill="#1b5275" stroke="#10364d" stroke-width="2"/>
  
  <!-- Body shading -->
  <path d="M 25 50 L 25 70 A 25 10 0 0 0 75 70 L 75 50 Z" fill="#256c9a" opacity="0.6"/>

  <!-- Top surface -->
  <ellipse cx="50" cy="50" rx="30" ry="15" fill="#3288c1" stroke="#164666" stroke-width="2"/>
  
  <!-- Outer rim on top -->
  <ellipse cx="50" cy="50" rx="26" ry="12" fill="none" stroke="#256c9a" stroke-width="2"/>
  
  <g fill="#ffffff" transform="scale(0.8) translate(12, 12)">
    <!-- Top arrow -->
    <path d="M 45 30 L 55 30 L 50 40 Z" />
    <rect x="48" y="20" width="4" height="10" />
    <!-- Bottom arrow -->
    <path d="M 45 60 L 55 60 L 50 50 Z" />
    <rect x="48" y="60" width="4" height="10" />
    <!-- Left arrow -->
    <path d="M 40 40 L 40 50 L 50 45 Z" />
    <rect x="30" y="43" width="10" height="4" />
    <!-- Right arrow -->
    <path d="M 60 40 L 60 50 L 50 45 Z" />
    <rect x="60" y="43" width="10" height="4" />
  </g>
</svg>
