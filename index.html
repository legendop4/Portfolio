<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shivam Sharma | Cybersecurity Portfolio</title>

    <!-- Core CSS -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components/boot.css">
    <link rel="stylesheet" href="css/components/lock.css">
    <link rel="stylesheet" href="css/components/desktop.css">
    <link rel="stylesheet" href="css/components/window.css">
    <link rel="stylesheet" href="css/components/terminal.css">
    <link rel="stylesheet" href="css/components/skills.css">

    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="app">
        <!-- Boot Screen -->
        <div id="boot-screen" class="screen active">
            <div class="terminal-output" id="boot-logs"></div>
            <div class="cursor blinking"></div>
        </div>

        <!-- Lock Screen -->
        <div id="lock-screen" class="screen hidden">
            <div class="lock-terminal" id="lock-container">
                <div id="lock-login-text"></div>
                <form id="login-form" style="display: none;">
                    <span class="prompt">password: </span>
                    <input type="password" id="password-input" autocomplete="off" autofocus>
                </form>
            </div>
        </div>

        <!-- Desktop Environment -->
        <div id="desktop" class="screen hidden">
            <div id="desktop-bg"></div>
            <div id="desktop-icons"></div>

            <div id="quick-actions"
                style="position: absolute; bottom: 60px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 100;">
                <button id="btn-run-demo"
                    style="background: rgba(0, 212, 255, 0.15); border: 1px solid var(--accent-blue); color: var(--accent-blue); padding: 10px 15px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-weight: bold; font-size: 13px; backdrop-filter: blur(5px); transition: all 0.2s;"
                    onmouseover="this.style.background='var(--accent-blue)'; this.style.color='#000';"
                    onmouseout="this.style.background='rgba(0, 212, 255, 0.15)'; this.style.color='var(--accent-blue)';">
                    ▶ START DEMO
                </button>
                <button id="btn-recruiter-mode"
                    style="background: rgba(34, 197, 94, 0.15); border: 1px solid #22c55e; color: #22c55e; padding: 10px 15px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-weight: bold; font-size: 13px; backdrop-filter: blur(5px); transition: all 0.2s;"
                    onmouseover="this.style.background='#22c55e'; this.style.color='#000';"
                    onmouseout="this.style.background='rgba(34, 197, 94, 0.15)'; this.style.color='#22c55e';">
                    📄 RECRUITER VIEW
                </button>
            </div>

            <div id="desktop-notifications"
                style="position: absolute; top: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; overflow: hidden;">
            </div>

            <div id="window-container"></div>

            <div id="taskbar">
                <button id="start-btn" class="taskbar-btn">Kali</button>
                <div id="taskbar-apps"></div>
                <div id="taskbar-tray"
                    style="display:flex; align-items:center; gap:15px; padding-right:15px; color:#ccc; font-size:12px; font-family: var(--font-sans);">
                    <span title="Network">📶</span>
                    <span title="Battery">🔋 87%</span>
                    <div id="taskbar-time"></div>
                </div>
            </div>
        </div>

        <!-- Recruiter Modal overlay -->
        <div id="recruiter-modal"
            style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 9999; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease; pointer-events: none;">
            <div
                style="background: #111; border: 1px solid var(--accent-blue); padding: 40px; border-radius: 8px; max-width: 600px; width: 90%; color: #fff; font-family: var(--font-sans); position: relative; box-shadow: 0 10px 30px rgba(0,212,255,0.2);">
                <button id="close-recruiter"
                    style="position: absolute; top: 15px; right: 15px; background: none; border: none; color: #888; font-size: 24px; cursor: pointer; transition: color 0.2s;"
                    onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#888'">&times;</button>
                <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 20px;">
                    <div
                        style="width: 80px; height: 80px; border-radius: 50%; background: url('assets/phota.png') center/cover; border: 2px solid var(--accent-blue);">
                    </div>
                    <div>
                        <h2 id="recruiter-name" style="color: var(--accent-blue); margin: 0; font-size: 28px;">
                            Loading...</h2>
                        <span id="recruiter-subtitle"
                            style="color: #bbb; font-size: 14px; font-family: var(--font-mono);">Loading...</span>
                    </div>
                </div>
                <p id="recruiter-about" style="color: #ddd; line-height: 1.6; margin-bottom: 25px; font-size: 15px;">
                    Loading...</p>

                <h3
                    style="color: var(--accent-blue); font-size: 16px; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px;">
                    Key Skills</h3>
                <p id="recruiter-skills" style="color: #aaa; font-size: 14px; line-height: 1.6; margin-bottom: 25px;">
                    Loading...</p>

                <div style="display: flex; gap: 15px;">
                    <a id="recruiter-github" href="#" target="_blank"
                        style="flex: 1; text-align: center; padding: 12px; background: #222; color: #fff; text-decoration: none; border-radius: 4px; font-size: 14px; font-weight: bold; border: 1px solid #444; transition: background 0.2s;"
                        onmouseover="this.style.background='#444'" onmouseout="this.style.background='#222'">GitHub</a>
                    <a id="recruiter-linkedin" href="#" target="_blank"
                        style="flex: 1; text-align: center; padding: 12px; background: #0077b5; color: #fff; text-decoration: none; border-radius: 4px; font-size: 14px; font-weight: bold; border: 1px solid #0077b5; transition: opacity 0.2s;"
                        onmouseover="this.style.opacity='0.8'" onmouseout="this.style.opacity='1'">LinkedIn</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Core Scripts (ES Modules) -->
    <script type="module" src="js/main.js?v=9"></script>
</body>

</html>
